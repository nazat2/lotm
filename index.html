<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/navLogo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOTM</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Botpress webchat: loaded after the page is idle so it never blocks first paint / mobile scroll -->
    <script>
      (function loadBotpress() {
        function inject() {
          var s1 = document.createElement("script");
          s1.src = "https://cdn.botpress.cloud/webchat/v3.6/inject.js";
          s1.defer = true;
          document.body.appendChild(s1);

          s1.onload = function () {
            var s2 = document.createElement("script");
            s2.src = "https://files.bpcontent.cloud/2026/07/09/06/20260709065625-R2Q87BQH.js";
            s2.defer = true;
            document.body.appendChild(s2);
          };
        }

        if ("requestIdleCallback" in window) {
          window.addEventListener("load", () => requestIdleCallback(inject, { timeout: 4000 }));
        } else {
          window.addEventListener("load", () => setTimeout(inject, 2000));
        }
      })();
    </script>
  </body>
</html>
